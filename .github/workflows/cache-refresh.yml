name: Cache Refresh

on:
  workflow_dispatch:

jobs:
  refresh:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --filter @semianalysisai/inferencex-app...
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Invalidate cache
        env:
          INVALIDATE_SECRET: ${{ secrets.VERCEL_INVALIDATE_SECRET }}
        run: pnpm admin:cache:invalidate https://inferencex.semianalysis.com

      - name: Warm up cache
        run: pnpm admin:cache:warmup https://inferencex.semianalysis.com
