name: Claude Weekly Media Mentions

on:
  schedule:
    - cron: '0 14 * * 0' # Every Sun at 14:00 UTC
  workflow_dispatch:

concurrency:
  group: claude-cron-media
  cancel-in-progress: false

jobs:
  update-media-mentions:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PAT }}
      GH_TOKEN: ${{ secrets.PAT }}
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Compute weekly window (UTC)
        id: dates
        run: |
          END_DATE=$(date -u +%F)
          START_DATE=$(date -u -d "7 days ago" +%F)
          echo "start_date=$START_DATE" >> "$GITHUB_OUTPUT"
          echo "end_date=$END_DATE" >> "$GITHUB_OUTPUT"

      - name: Find weekly InferenceX mentions
        uses: anthropics/claude-code-action@6062f3709600659be5e47fcddf2cf76993c235c2 # v1.0.76
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.PAT }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Edit,MultiEdit,Write,Glob,Grep,WebSearch,WebFetch"
          prompt: |
            You are updating the media mentions list for InferenceX.

            File to edit:
            - packages/app/src/components/media/media-data.ts

            Time window (UTC):
            - START_DATE: ${{ steps.dates.outputs.start_date }}
            - END_DATE: ${{ steps.dates.outputs.end_date }}

            Goal:
            - Find NEW mentions of InferenceX from the last 7 days and append them to MEDIA_ITEMS.
            - Use WebSearch first (not just WebFetch) so discovery is broad and date-aware.
            - Use date-bounded WebSearch queries (for example: "InferenceX after:START_DATE before:END_DATE").
            - Verify each candidate by opening the source URL with WebFetch before editing.

            Tool execution constraints:
            - Execute tools sequentially (one tool call at a time). Do not batch or parallelize tool calls.
            - Prioritize high-signal domains first: newsletter.semianalysis.com, blogs.nvidia.com, developer.nvidia.com, amd.com, cloud.google.com, blog.aks.azure.com, blog.vllm.ai, lmsys.org, youtube.com.
            - De-prioritize/avoid low-signal aggregators and repost sites unless no better source exists.
            - For each candidate URL:
              1) Try WebFetch on the original URL.
              2) If WebFetch fails with 403/429/5xx or bot-blocking, retry once using `https://r.jina.ai/http://<original-url-without-scheme>`.
              3) If still unavailable or unverifiable, exclude it and continue.
            - Do not repeatedly retry the same failing URL or domain.
            - Stop after checking a reasonable set of candidates (about 12) to avoid search loops.

            Inclusion criteria:
            - Keep only high-signal items similar to existing entries:
              - Established publications or official company/engineering blogs
              - Official videos/webinars/podcasts from recognized organizations/channels
            - Exclude low-signal sources:
              - Personal blogs, low-credibility aggregators, random social posts, forum posts
            - Only include items that clearly mention InferenceX.
            - Only include items with a publish date inside [START_DATE, END_DATE] (inclusive).
            - Require a verifiable publish date from the source page metadata/content; if no verifiable date, exclude.
            - Do not include duplicates already in MEDIA_ITEMS (match by URL and title).
            - Keep date format as YYYY-MM-DD and type as 'article' or 'video'.

            Editing rules:
            - Preserve the existing TypeScript structure and formatting in packages/app/src/components/media/media-data.ts.
            - Add only truly new entries to MEDIA_ITEMS.
            - Keep newly added entries ordered newest first.
            - If no qualifying mentions exist, do not modify any file.
            - Do not create commits, branches, or pull requests; only edit local files.

      - name: Create PR if media mentions changed
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.PAT }}
          commit-message: 'chore(media): add weekly InferenceX mentions'
          branch: 'claude/cron-media-${{ github.run_id }}'
          delete-branch: true
          draft: true
          title: 'chore(media): weekly InferenceX media mentions'
          body: |
            Automated weekly media scan for InferenceX.

            Window (UTC): ${{ steps.dates.outputs.start_date }} to ${{ steps.dates.outputs.end_date }}

            This PR updates `packages/app/src/components/media/media-data.ts` with newly discovered high-signal mentions from the last week.
            Please review source quality and accuracy before merging.
          add-paths: |
            packages/app/src/components/media/media-data.ts

      - name: Report PR result
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            echo "Created PR #$PR_NUMBER"
          else
            echo "No qualifying new mentions found; no PR created."
          fi
